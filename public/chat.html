<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabelChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="chat-page">
  <div class="chat-layout">

    <!-- Connection banner -->
    <div class="connection-bar hidden" id="connection-bar">
      <span id="connection-text" data-i18n="chat.reconnecting">Reconectando...</span>
    </div>

    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <span class="logo-small">🗼</span>
        <span class="header-title">BabelChat</span>
      </div>
      <div class="header-center">
        <span class="room-label" data-i18n="chat.room_label">Sala</span>
        <span class="room-id" id="room-id-display"></span>
        <span class="room-lock hidden" id="room-lock" data-i18n-title="chat.room_lock_title" title="Sala protegida com senha">🔒</span>
        <button class="btn-copy" id="btn-copy-link" data-i18n="chat.copy_link">📋 Copiar link</button>
      </div>
      <div class="header-right">
        <button class="btn-notif" id="btn-notif" data-i18n-title="chat.enable_notifications" title="Ativar notificações">🔔</button>
        <span class="user-badge">
          <span id="my-lang-flag"></span>
          <span id="my-name"></span>
        </span>
      </div>
    </header>

    <div class="chat-body">

      <!-- Drag & drop overlay -->
      <div class="drop-overlay hidden" id="drop-overlay">
        <div class="drop-content">
          <span class="drop-icon">📎</span>
          <p data-i18n="chat.drop_to_send">Solte para enviar</p>
        </div>
      </div>

      <!-- Messages -->
      <main class="messages-area" id="messages-area">
        <div class="welcome-msg" id="welcome-msg">
          <div class="welcome-icon">🗼</div>
          <p data-i18n="chat.welcome">Bem-vindo ao BabelChat!</p>
          <p class="welcome-sub" data-i18n="chat.welcome_sub">Compartilhe o link da sala para convidar pessoas do mundo todo.</p>
        </div>
      </main>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span>👥</span>
          <span id="user-count">0</span>
        </div>
        <ul class="user-list" id="user-list"></ul>
        <div class="sidebar-footer">
          <div class="lang-stats" id="lang-stats"></div>
        </div>
      </aside>

    </div>

    <!-- Footer / Input -->
    <footer class="chat-footer">
      <div class="typing-indicator" id="typing-indicator"></div>

      <!-- Recording indicator -->
      <div class="recording-bar hidden" id="recording-bar">
        <span class="rec-dot"></span>
        <span id="rec-timer">0:00</span>
        <span class="rec-label" data-i18n="chat.recording">Gravando...</span>
        <button class="btn-rec-cancel" id="btn-rec-cancel" data-i18n="chat.cancel">Cancelar</button>
      </div>

      <div class="input-area">
        <!-- File attach -->
        <button class="btn-icon" id="btn-attach" data-i18n-title="chat.attach_title" title="Enviar imagem ou arquivo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path>
          </svg>
        </button>
        <input type="file" id="file-input" class="hidden" accept="image/*,audio/*,.pdf,.doc,.docx,.txt,.zip" />

        <input
          type="text"
          id="message-input"
          data-i18n-placeholder="chat.message_placeholder"
          placeholder="Digite sua mensagem..."
          maxlength="2000"
          autocomplete="off"
        />

        <!-- Audio record -->
        <button class="btn-icon btn-mic" id="btn-mic" data-i18n-title="chat.record_audio_title" title="Gravar áudio">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"></path>
            <path d="M19 10v2a7 7 0 01-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>

        <!-- Send -->
        <button class="btn-send" id="btn-send" data-i18n-title="chat.send_title" title="Enviar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="i18n.js"></script>
  <script src="chat.js"></script>
</body>
</html>
