<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BabelChat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-page">
  <div class="landing">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🗼</div>
        <h1>BabelChat</h1>
        <p class="typewriter" id="typewriter">
          <span id="typewriter-text">Converse com qualquer pessoa, em qualquer idioma.</span><span class="typewriter-cursor">|</span>
        </p>
      </div>

      <!-- Banner: joining existing room -->
      <div id="room-banner" class="room-banner hidden">
        <span>🔗</span>
        <span id="room-banner-text"></span>
      </div>

      <!-- Error banner -->
      <div id="error-banner" class="error-banner hidden">
        <span id="error-text"></span>
      </div>

      <div class="form">
        <div class="field">
          <label for="name-input" data-i18n="landing.your_name">Seu nome</label>
          <input
            type="text"
            id="name-input"
            data-i18n-placeholder="landing.name_placeholder"
            placeholder="Como quer ser chamado?"
            maxlength="30"
            autocomplete="off"
          />
        </div>

        <div class="field">
          <label data-i18n="landing.your_language">Seu idioma</label>
          <div class="lang-grid" id="lang-grid"></div>
        </div>

        <!-- Room creation section (hidden when joining) -->
        <div id="create-section">
          <div class="divider"><span data-i18n="landing.configure_room">configurar sala</span></div>

          <div class="field">
            <label for="room-input">
              <span data-i18n="landing.room_name">Nome da sala</span>
              <span class="optional" data-i18n="landing.optional">(opcional)</span>
            </label>
            <input
              type="text"
              id="room-input"
              data-i18n-placeholder="landing.room_placeholder"
              placeholder="ex: viagem-europa, amigos-2024"
              maxlength="30"
              autocomplete="off"
            />
            <span class="hint" id="room-hint" data-i18n="landing.room_hint">Letras, números e hífens. Deixe vazio para gerar um aleatório.</span>
          </div>

          <div class="field">
            <label for="password-input">
              <span data-i18n="landing.password">Senha</span>
              <span class="optional" data-i18n="landing.optional">(opcional)</span>
            </label>
            <input
              type="password"
              id="password-input"
              data-i18n-placeholder="landing.password_placeholder"
              placeholder="Deixe vazio para sala aberta"
              maxlength="50"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Password prompt (when joining a locked room) -->
        <div id="password-section" class="hidden">
          <div class="field">
            <label for="join-password-input" data-i18n="landing.locked_room">🔒 Sala protegida — digite a senha</label>
            <input
              type="password"
              id="join-password-input"
              data-i18n-placeholder="landing.room_password_placeholder"
              placeholder="Senha da sala"
              maxlength="50"
              autocomplete="off"
            />
          </div>
        </div>

        <button class="btn-primary" id="btn-enter" disabled data-i18n="landing.create_and_enter">
          Criar Sala e Entrar →
        </button>
      </div>
    </div>

    <p class="footer-note" data-i18n="landing.footer_note">
      Salas são efêmeras — somem quando todos saem.
    </p>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
